{{- if .Values.mailpit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "n8n.fullname" . }}-mailpit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    app.kubernetes.io/component: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "n8n.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mailpit
  template:
    metadata:
      labels:
        {{- include "n8n.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mailpit
    spec:
      {{- if hasKey .Values "enableServiceLinks" }}
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.mailpit.podSecurityContext | nindent 8 }}
      containers:
        - name: mailpit
          image: "{{ .Values.mailpit.image.repository }}:{{ .Values.mailpit.image.tag }}"
          imagePullPolicy: {{ .Values.mailpit.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.mailpit.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.mailpit.ui.port }}
              protocol: TCP
            - name: smtp
              containerPort: {{ .Values.mailpit.smtp.port }}
              protocol: TCP
          {{- with .Values.mailpit.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "n8n.fullname" . }}-mailpit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    app.kubernetes.io/component: mailpit
spec:
  type: {{ .Values.mailpit.service.type }}
  ports:
    - port: {{ .Values.mailpit.ui.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.mailpit.smtp.port }}
      targetPort: smtp
      protocol: TCP
      name: smtp
  selector:
    {{- include "n8n.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mailpit
{{- if and .Values.mailpit.route.enabled .Values.route.enabled }}
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: {{ include "n8n.fullname" . }}-mailpit
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    app.kubernetes.io/component: mailpit
spec:
  to:
    kind: Service
    name: {{ include "n8n.fullname" . }}-mailpit
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
{{- end }}
