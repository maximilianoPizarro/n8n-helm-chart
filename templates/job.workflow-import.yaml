{{- if and .Values.workflows .Values.workflows.autoImport .Values.workflows.autoImport.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "n8n.fullname" . }}-workflow-import
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    app.kubernetes.io/component: workflow-import
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "n8n.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: workflow-import
    spec:
      {{- if hasKey .Values "enableServiceLinks" }}
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      {{- end }}
      serviceAccountName: {{ include "n8n.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.main.podSecurityContext | nindent 8 }}
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-n8n
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          securityContext:
            {{- toYaml .Values.main.securityContext | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for n8n to be ready..."
              until wget -q --spider http://{{ include "n8n.fullname" . }}:{{ default 5678 .Values.main.service.port }}/healthz 2>/dev/null; do
                echo "n8n not ready yet, waiting 5s..."
                sleep 5
              done
              echo "n8n is ready!"
        - name: download-workflows
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          securityContext:
            {{- toYaml .Values.main.securityContext | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /tmp/workflows
              {{- range .Values.workflows.autoImport.urls }}
              echo "Downloading {{ . }}"
              wget -q -O "/tmp/workflows/$(basename {{ . }})" "{{ . }}" || echo "Failed to download {{ . }}"
              {{- end }}
              echo "Downloaded workflows:"
              ls -la /tmp/workflows/
          volumeMounts:
            - name: workflows
              mountPath: /tmp/workflows
      containers:
        - name: import
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.main.securityContext | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Importing workflows from /tmp/workflows/"
              ls -la /tmp/workflows/
              if [ "$(ls -A /tmp/workflows/*.json 2>/dev/null)" ]; then
                n8n import:workflow --separate --input=/tmp/workflows/ || echo "Import completed with warnings"
                echo "Workflow import finished successfully"
              else
                echo "No workflow JSON files found to import"
              fi
          envFrom:
            {{- if .Values.main.config }}
            - configMapRef:
                name: {{ include "n8n.fullname" . }}-app-config
            {{- end }}
            {{- if .Values.main.secret }}
            - secretRef:
                name: {{ include "n8n.fullname" . }}-app-secret
            {{- end }}
          env: {{ not (empty .Values.main.extraEnv) | ternary nil "[]" }}
            {{- range $key, $value := .Values.main.extraEnv }}
            - name: {{ $key }}
              {{- toYaml $value | nindent 14 }}
            {{- end }}
          volumeMounts:
            - name: workflows
              mountPath: /tmp/workflows
            - name: data
              mountPath: /home/node/.n8n
      volumes:
        - name: workflows
          emptyDir: {}
        - name: data
          {{ include "n8n.pvc" . }}
{{- end }}
