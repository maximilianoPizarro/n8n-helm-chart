apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "n8n.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
    {{- if .Values.main.deploymentLabels }}
    {{- toYaml .Values.main.deploymentLabels | nindent 4 }}
    {{- end }}
  {{- if .Values.main.deploymentAnnotations }}
  annotations:
    {{- toYaml .Values.main.deploymentAnnotations | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.main.autoscaling.enabled }}
  replicas: {{ .Values.main.replicaCount | default .Values.main.count }}
  {{- end }}
  strategy:
    type: {{ .Values.main.deploymentStrategy.type }}
    {{- if eq .Values.main.deploymentStrategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ default "25%" .Values.main.deploymentStrategy.maxSurge  }}
      maxUnavailable: {{ default "25%" .Values.main.deploymentStrategy.maxUnavailable }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "n8n.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/type: master
  template:
    metadata:
      annotations:
        checksum/config: {{ print .Values.main | sha256sum }}
        {{- with .Values.main.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "n8n.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/type: master
        {{- if .Values.main.podLabels }}
          {{ toYaml .Values.main.podLabels | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "n8n.serviceAccountName" . }}
      {{- if hasKey .Values "enableServiceLinks" }}
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.main.podSecurityContext | nindent 8 }}
      {{- if or .Values.main.initContainers (and .Values.workflows .Values.workflows.autoImport .Values.workflows.autoImport.enabled) }}
      initContainers:
      {{- if and .Values.workflows .Values.workflows.autoImport .Values.workflows.autoImport.enabled }}
        - name: download-workflows
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          securityContext:
            {{- toYaml .Values.main.securityContext | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /tmp/workflows
              {{- range .Values.workflows.autoImport.urls }}
              echo "Downloading {{ . }}"
              wget -q -O "/tmp/workflows/$(basename {{ . }})" "{{ . }}" || echo "Failed: {{ . }}"
              {{- end }}
              echo "Downloaded $(ls /tmp/workflows/*.json 2>/dev/null | wc -l) workflows"
          volumeMounts:
            - name: workflow-data
              mountPath: /tmp/workflows
        - name: import-workflows
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          securityContext:
            {{- toYaml .Values.main.securityContext | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ "$(ls -A /tmp/workflows/*.json 2>/dev/null)" ]; then
                n8n import:workflow --separate --input=/tmp/workflows/ 2>&1 || true
                echo "Imported workflows successfully"
              else
                echo "No workflow files found"
              fi
          envFrom:
            {{- if .Values.main.config }}
            - configMapRef:
                name: {{ include "n8n.fullname" . }}-app-config
            {{- end }}
          env:
            {{- range $key, $value := .Values.main.extraEnvVars }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: workflow-data
              mountPath: /tmp/workflows
            - name: data
              mountPath: {{ .Values.main.persistence.mountPath | default "/home/node/.n8n" }}
      {{- end }}
      {{- if .Values.main.initContainers }}
        {{ tpl (toYaml .Values.main.initContainers) . | nindent 10 }}
      {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.main.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.main.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            {{- if .Values.main.config }}
            - configMapRef:
                name: {{ include "n8n.fullname" . }}-app-config
            {{- end }}
           {{- if .Values.main.secret }}
            - secretRef:
                name: {{ include "n8n.fullname" . }}-app-secret
            {{- end }}
          env:
            {{- range $key, $value := .Values.main.extraEnvVars }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.main.extraEnv }}
            - name: {{ $key }}
              {{- toYaml $value | nindent 14 }}
            {{- end }}
          lifecycle:
            {{- toYaml .Values.main.lifecycle | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ get (default (dict) .Values.main.config.n8n) "port" | default 5678 }}
              protocol: TCP
          {{- with .Values.main.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.main.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.main.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.main.persistence.mountPath | default "/home/node/.n8n" }}
          {{- if .Values.main.extraVolumeMounts }}
            {{- toYaml .Values.main.extraVolumeMounts | nindent 12 }}
          {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.main.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.main.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.main.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: "data"
          {{ include "n8n.pvc" . }}
        {{- if and .Values.workflows .Values.workflows.autoImport .Values.workflows.autoImport.enabled }}
        - name: workflow-data
          emptyDir: {}
        {{- end }}
        {{- if .Values.main.extraVolumes }}
          {{- toYaml .Values.main.extraVolumes | nindent 8 }}
        {{- end }}
